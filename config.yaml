# MP3 auto-tagger configuration

site_names:
  - CeeNaija.com
  - waploaded.com
  - waploaded
  - jointearn.com
  - jointearn
  - waptrick.com
  - waptrick
  - naijaloaded.com
  - naijaloaded
  - tooxclusive.com
  - tooxclusive
  - justnaija.com
  - justnaija

# Comment is fully user-defined. Leave empty, or set any text you want, e.g.:
#   comment: "ripped for personal library"
#   comment: "My Archive 2026"
# CLI --comment and the GUI Comment field override this per run.
tags:
  comment: ""

cover:
  size: 1000       # square pixels (1000x1000) — standard album art
  quality: 90      # JPEG quality (1-100)

ffmpeg:
  path: ffmpeg
  timeout_seconds: 60

backup:
  suffix: ".bak"

defaults:
  genre: ""